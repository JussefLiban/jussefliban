const SERIES_CONFIG = {
  "hidraulica":                      { nombre: "Hidráulica",               color: "#3182ce" },
  "casos-reales-y-lecciones":        { nombre: "Casos Reales y Lecciones", color: "#dd6b20" },
  "comportamiento-humano-en-incendios": { nombre: "Comportamiento Humano", color: "#805ad5" },
  "dinamica-del-fuego":              { nombre: "Dinámica del Fuego",       color: "#e53e3e" },
  "divulgacion-y-reflexion":         { nombre: "Divulgación y Reflexión",  color: "#d69e2e" },
  "materiales-y-construccion":       { nombre: "Materiales y Construcción",color: "#718096" },
  "normativa-y-criterio-tecnico":    { nombre: "Normativa y Criterio",     color: "#38a169" },
  "rociadores":                      { nombre: "Rociadores",               color: "#319795" },
};

let serieSeleccionada = "";

document.getElementById('contadorTotal').textContent = ARTICULOS.length + ' artículos';

// Construir chips de series con contadores
function buildSeriesBar() {
  const bar = document.getElementById('seriesBar');
  const conteos = {};
  ARTICULOS.forEach(a => { conteos[a.serie] = (conteos[a.serie] || 0) + 1; });

  let html = `<span class="serie-chip active" style="background:#4a5568;" onclick="setSerie('')">Todas (${ARTICULOS.length})</span>`;
  for (const [slug, cfg] of Object.entries(SERIES_CONFIG)) {
    const n = conteos[slug] || 0;
    if (n > 0) html += `<span class="serie-chip" style="background:${cfg.color};" onclick="setSerie('${slug}')">${cfg.nombre} (${n})</span>`;
  }
  bar.innerHTML = html;
}

function setSerie(slug) {
  serieSeleccionada = slug;
  document.querySelectorAll('.serie-chip').forEach(c => c.classList.remove('active'));
  const chips = document.querySelectorAll('.serie-chip');
  chips.forEach(c => { if (c.textContent.includes(slug === '' ? 'Todas' : SERIES_CONFIG[slug]?.nombre)) c.classList.add('active'); });
  filtrar();
}

function resaltar(texto, q) {
  if (!q) return texto;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return texto.replace(re, '<mark>$1</mark>');
}

function filtrar() {
  const q = document.getElementById('buscar').value.trim();
  const ql = q.toLowerCase();
  const lectura = document.getElementById('lectura').value;
  const orden = document.getElementById('orden').value;

  let lista = ARTICULOS.filter(a => {
    const matchQ = !ql || a.title.toLowerCase().includes(ql) || (a.brief && a.brief.toLowerCase().includes(ql)) || a.tags.some(t => t.toLowerCase().includes(ql));
    const matchSerie = !serieSeleccionada || a.serie === serieSeleccionada;
    let matchLectura = true;
    if (lectura === '5')  matchLectura = a.mins < 5;
    if (lectura === '10') matchLectura = a.mins >= 5 && a.mins <= 10;
    if (lectura === '99') matchLectura = a.mins > 10;
    return matchQ && matchSerie && matchLectura;
  });

  if (orden === 'az') lista.sort((a,b) => a.title.localeCompare(b.title, 'es'));
  else if (orden === 'lectura') lista.sort((a,b) => a.mins - b.mins);

  document.getElementById('info').textContent = lista.length + ' artículos encontrados';
  document.getElementById('serieActiva').textContent = serieSeleccionada ? (SERIES_CONFIG[serieSeleccionada]?.nombre || '') : '';

  const grid = document.getElementById('grid');
  if (lista.length === 0) {
    grid.innerHTML = '<div class="vacio">No se encontraron artículos con ese criterio.</div>';
    return;
  }

  grid.innerHTML = lista.map(a => {
    const cfg = SERIES_CONFIG[a.serie] || { color: '#4a5568', nombre: 'General' };
    const tituloH = resaltar(a.title, q);
    const briefH = resaltar(a.brief || '', q);
    const cover = a.cover ? `<img class="card-cover" src="${a.cover}" alt="" loading="lazy">` : '';
    return `
      <div class="card">
        ${cover}
        <div class="card-body">
          <span class="card-serie-badge" style="background:${cfg.color}">${a.serieNombre || 'General'}</span>
          <h3>${tituloH}</h3>
          <p>${briefH}</p>
          <div class="card-footer">
            <span class="mins">${a.mins} min lectura</span>
            <a class="leer" href="${a.url}" target="_blank">Leer &rarr;</a>
          </div>
        </div>
      </div>`;
  }).join('');
}

function articuloAleatorio() {
  const idx = Math.floor(Math.random() * ARTICULOS.length);
  window.open(ARTICULOS[idx].url, '_blank');
}

function toggleTheme() {
  const html = document.documentElement;
  const btn = document.querySelector('.theme-btn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '🌙 Modo oscuro';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️ Modo claro';
  }
}

buildSeriesBar();
filtrar();
</script>
